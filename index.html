<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Jiahua Ma — Design Engineer</title>
    <meta
      name="description"
      content="Jiahua Ma — Design Engineer at Visa, game developer and competitive table tennis player. Portfolio, projects, and a cyberpunk-themed recipe collection."
    />
    <link rel="canonical" href="https://jiahuama.com/" />
    <link
      rel="alternate"
      type="application/rss+xml"
      title="Jiahua Ma — Blog"
      href="https://jiahuama.com/rss.xml"
    />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#0b0f14" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Jiahua Ma" />
    <meta property="og:url" content="https://jiahuama.com/" />
    <meta property="og:title" content="Jiahua Ma — Design Engineer" />
    <meta
      property="og:description"
      content="Design Engineer at Visa, game developer and competitive table tennis player."
    />
    <meta property="og:image" content="https://jiahuama.com/og-default.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://jiahuama.com/og-default.jpg" />
    <meta name="twitter:title" content="Jiahua Ma — Design Engineer" />
    <meta
      name="twitter:description"
      content="Design Engineer at Visa, game developer and competitive table tennis player."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load the font CSS without blocking first paint: preload, then swap
         media to all on load. display=swap already avoids invisible text. -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      />
    </noscript>

    <!-- Theme bootstrap: sync data-theme BEFORE React mounts so there's
         no flash of the wrong theme on first paint. -->
    <script>
      (function () {
        try {
          var override = localStorage.getItem("jiahuama:theme");
          var prefersDark =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches;
          var theme =
            override === "dark" || override === "light"
              ? override
              : prefersDark
              ? "dark"
              : "light";
          document.documentElement.setAttribute("data-theme", theme);
        } catch (_) {
          document.documentElement.setAttribute("data-theme", "light");
        }
        try {
          var lang = localStorage.getItem("jiahuama:lang");
          document.documentElement.setAttribute(
            "lang",
            lang === "zh" ? "zh-CN" : "en"
          );
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
