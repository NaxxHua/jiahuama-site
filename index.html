      rel="stylesheet"
    />

    <!-- Theme bootstrap: sync data-theme BEFORE React mounts so there's
         no flash of the wrong theme on first paint. -->
    <script>
      (function () {
        try {
          var override = localStorage.getItem("jiahuama:theme");
          var prefersDark =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches;
          var theme =
            override === "dark" || override === "light"
              ? override
              : prefersDark
              ? "dark"
              : "light";
          document.documentElement.setAttribute("data-theme", theme);
        } catch (_) {
          document.documentElement.setAttribute("data-theme", "light");
        }
        try {
          var lang = localStorage.getItem("jiahuama:lang");
          document.documentElement.setAttribute(
            "lang",
            lang === "zh" ? "zh-CN" : "en"
          );
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
